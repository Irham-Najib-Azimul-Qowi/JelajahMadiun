<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Destinasi Wisata — JelajahMadiun</title>
  <meta name="description" content="Daftar lengkap 34 objek wisata buatan, cagar budaya sejarah, religi, dan kuliner legendaris Kota Madiun. Cari dan filter destinasi favoritmu.">
  <link rel="canonical" href="https://jelajahmadiun.pages.dev/src/pages/wisata.html">

  <link rel="stylesheet" href="/src/css/variables.css">
  <link rel="stylesheet" href="/src/css/base.css">
  <link rel="stylesheet" href="/src/css/layout.css">
  <link rel="stylesheet" href="/src/css/components.css">
  <link rel="stylesheet" href="/src/css/utilities.css">
  <link rel="stylesheet" href="/src/css/responsive.css">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div data-component="navbar"></div>

  <main class="main-content">

    <!-- Page Header -->
    <div style="background: linear-gradient(135deg, #0F766E 0%, #0D4F4C 100%); padding: 3.5rem 0 4rem; margin-bottom: 0;">
      <div class="container">
        <nav class="breadcrumb" style="color: rgba(255,255,255,0.7);">
          <a href="/" style="color: rgba(255,255,255,0.7);">Beranda</a>
          <span class="breadcrumb-separator">/</span>
          <span style="color: #fff;">Semua Destinasi</span>
        </nav>
        <h1 style="color: #fff; font-size: 2.5rem; margin-bottom: 0.75rem;">Semua Destinasi Wisata</h1>
        <p style="color: rgba(255,255,255,0.8); font-size: 1.05rem; font-weight: 400;">Temukan 34+ tempat wisata menarik dan kuliner khas Kota Madiun</p>
      </div>
    </div>

    <!-- Search & Filter Bar -->
    <div style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.5rem 0; position: sticky; top: 68px; z-index: 100; box-shadow: var(--shadow-sm);">
      <div class="container">
        <div class="d-flex align-center gap-3 flex-wrap">
          <!-- Inline Search -->
          <div style="flex: 1; min-width: 240px; max-width: 400px;">
            <div style="display: flex; align-items: center; background: var(--background); border: 1px solid var(--border); border-radius: var(--radius-full); padding: 0.45rem 1rem 0.45rem 0.75rem; gap: 0.5rem;">
              <i data-lucide="search" style="width: 18px; height: 18px; color: var(--text-light); flex-shrink: 0;"></i>
              <input type="text" id="search-input" placeholder="Cari destinasi wisata…" style="border: none; outline: none; background: transparent; flex: 1; font-size: 0.92rem; color: var(--text-main);">
              <button id="search-btn" style="display: none;" aria-label="Cari"></button>
            </div>
          </div>

          <!-- Category Pills -->
          <div class="d-flex gap-1 flex-wrap" id="category-pills" style="flex: 1;">
            <button class="btn btn-primary category-pill" style="padding: 0.45rem 1.1rem; font-size: 0.85rem; border-radius: var(--radius-full);" data-category="all">Semua</button>
            <button class="btn btn-outline category-pill" style="padding: 0.45rem 1.1rem; font-size: 0.85rem; border-radius: var(--radius-full);" data-category="wisata-buatan">Wisata Buatan</button>
            <button class="btn btn-outline category-pill" style="padding: 0.45rem 1.1rem; font-size: 0.85rem; border-radius: var(--radius-full);" data-category="wisata-sejarah">Sejarah</button>
            <button class="btn btn-outline category-pill" style="padding: 0.45rem 1.1rem; font-size: 0.85rem; border-radius: var(--radius-full);" data-category="wisata-religi">Religi</button>
            <button class="btn btn-outline category-pill" style="padding: 0.45rem 1.1rem; font-size: 0.85rem; border-radius: var(--radius-full);" data-category="kuliner">Kuliner</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Results Area -->
    <div class="container section">
      <div class="d-flex justify-between align-center mb-4">
        <span style="font-weight: 600; color: var(--text-muted); font-size: 0.9rem;" id="result-count-label">Memuat destinasi…</span>
      </div>

      <!-- Destination Grid -->
      <div class="grid-3" id="wisata-grid">
        <!-- Dynamically rendered by wisata.js -->
      </div>
    </div>

  </main>

  <div data-component="footer"></div>
  <div data-component="back-to-top"></div>

  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/pages/wisata.js"></script>
</body>
</html>
