<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semua Destinasi Wisata — JelajahMadiun</title>
  <meta name="description" content="Jelajahi 34+ destinasi wisata buatan, cagar budaya, religi, dan kuliner khas Kota Madiun. Cari dan filter sesuai kategori favoritmu.">
  <link rel="canonical" href="https://jelajahmadiun.pages.dev/src/pages/wisata.html">

  <link rel="stylesheet" href="/src/css/variables.css">
  <link rel="stylesheet" href="/src/css/base.css">
  <link rel="stylesheet" href="/src/css/layout.css">
  <link rel="stylesheet" href="/src/css/components.css">
  <link rel="stylesheet" href="/src/css/utilities.css">
  <link rel="stylesheet" href="/src/css/responsive.css">

  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <div data-component="navbar"></div>

  <main>

    <!-- Page Header -->
    <div class="page-header">
      <div class="container">
        <nav class="page-header-breadcrumb" aria-label="Breadcrumb">
          <a href="/">Beranda</a>
          <span aria-hidden="true">/</span>
          <span>Wisata</span>
        </nav>
        <h1>Semua Destinasi Wisata</h1>
        <p>34+ tempat wisata dan kuliner khas Kota Madiun siap untuk dijelajahi</p>
      </div>
    </div>

    <!-- Sticky Filter Bar -->
    <div class="filter-bar" role="search" aria-label="Filter destinasi wisata">
      <div class="container">
        <div class="filter-bar-inner">

          <!-- Search box -->
          <div class="search-box" style="max-width:360px;">
            <svg class="search-box-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="search-input" class="search-input" placeholder="Cari destinasi…" autocomplete="off" aria-label="Cari destinasi wisata">
            <button id="search-btn" style="display:none;" aria-label="Cari"></button>
          </div>

          <!-- Category pills -->
          <div style="display:flex; gap:var(--space-2); flex-wrap:wrap; align-items:center;" role="group" aria-label="Filter kategori">
            <button class="pill active" data-category="all">Semua</button>
            <button class="pill" data-category="wisata-buatan">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 21V9h6v12"/></svg>
              Wisata Buatan
            </button>
            <button class="pill" data-category="wisata-sejarah">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="22" x2="21" y2="22"/><polygon points="12 2 20 7 4 7"/></svg>
              Sejarah
            </button>
            <button class="pill" data-category="wisata-religi">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 22H6a2 2 0 0 1-2-2V9l8-7 8 7v11a2 2 0 0 1-2 2z"/></svg>
              Religi
            </button>
            <button class="pill" data-category="kuliner">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
              Kuliner
            </button>
          </div>

          <!-- Count label -->
          <span id="result-count-label" style="font-size:0.82rem; color:var(--text-muted); font-weight:600; margin-left:auto; white-space:nowrap;" aria-live="polite">Memuat…</span>
        </div>
      </div>
    </div>

    <!-- Destination Grid -->
    <section class="section">
      <div class="container">
        <div class="grid grid-3" id="wisata-grid">
          <!-- Rendered by wisata.js -->
        </div>
      </div>
    </section>

  </main>

  <div data-component="footer"></div>
  <div data-component="back-to-top"></div>

  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/pages/wisata.js"></script>
</body>
</html>
