<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Wisata — JelajahMadiun</title>

  <link rel="stylesheet" href="/src/css/variables.css">
  <link rel="stylesheet" href="/src/css/base.css">
  <link rel="stylesheet" href="/src/css/layout.css">
  <link rel="stylesheet" href="/src/css/components.css">
  <link rel="stylesheet" href="/src/css/utilities.css">
  <link rel="stylesheet" href="/src/css/responsive.css">

  <script src="https://unpkg.com/lucide@latest" defer></script>
</head>
<body>
  <div data-component="navbar"></div>

  <main>
    <div class="container section">

      <!-- Breadcrumb -->
      <nav style="display:flex; align-items:center; gap:var(--space-2); font-size:0.82rem; color:var(--text-muted); margin-bottom:var(--space-6);" aria-label="Breadcrumb">
        <a href="/" style="color:var(--text-muted);">Beranda</a>
        <span style="color:var(--border-mid);">/</span>
        <a href="/src/pages/wisata.html" style="color:var(--text-muted);">Wisata</a>
        <span style="color:var(--border-mid);">/</span>
        <span id="breadcrumb-current" style="color:var(--text); font-weight:600;">Detail</span>
      </nav>

      <!-- Cover Image -->
      <img id="dest-cover-img" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&auto=format&fit=crop" alt="Cover" class="detail-cover">

      <!-- 2-col layout -->
      <div class="detail-layout">

        <!-- Main Content -->
        <div>
          <!-- Title -->
          <div style="margin-bottom:var(--space-6);">
            <span id="dest-category-badge" class="pill active" style="margin-bottom:var(--space-3); display:inline-flex;">Kategori</span>
            <h1 id="dest-title" style="font-size:clamp(1.5rem,3.5vw,2.25rem); margin-bottom:var(--space-2);">Nama Destinasi</h1>
            <p id="dest-address" style="color:var(--text-sub); font-size:0.9rem; display:flex; align-items:center; gap:var(--space-2);">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--primary); flex-shrink:0;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              Kota Madiun, Jawa Timur
            </p>
          </div>

          <!-- Description -->
          <div class="detail-card">
            <h2 class="detail-card-title">Deskripsi</h2>
            <div id="dest-description-content" style="font-size:0.95rem; line-height:1.85; color:var(--text-sub);"></div>
          </div>

          <!-- Facilities -->
          <div class="detail-card" id="facilities-section">
            <h2 class="detail-card-title">Fasilitas & Layanan</h2>
            <div style="display:flex; gap:var(--space-2); flex-wrap:wrap;" id="dest-facilities-container"></div>
          </div>

          <!-- Gallery -->
          <div class="detail-card">
            <h2 class="detail-card-title">Galeri Foto</h2>
            <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-3);" id="dest-gallery-container"></div>
          </div>
        </div>

        <!-- Sidebar -->
        <div>
          <div class="detail-card" style="position:sticky; top:80px;">
            <h2 class="detail-card-title">Informasi Kunjungan</h2>

            <div class="info-row">
              <span class="info-label">Jam Operasional</span>
              <span class="info-value" id="dest-hours">—</span>
            </div>

            <div class="info-row">
              <span class="info-label">Harga Tiket</span>
              <span class="info-value" id="dest-ticket" style="color:var(--primary);">—</span>
            </div>

            <a id="dest-maps-btn" href="#" target="_blank" rel="noopener noreferrer"
               class="btn btn-primary" style="width:100%; margin-top:var(--space-4); border-radius:var(--r-full); justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
              Petunjuk Arah
            </a>
            <a href="/src/pages/wisata.html"
               class="btn btn-outline" style="width:100%; margin-top:var(--space-2); border-radius:var(--r-full); justify-content:center;">
              ← Kembali ke Daftar
            </a>
          </div>
        </div>

      </div>
    </div>
  </main>

  <div data-component="footer"></div>
  <div data-component="back-to-top"></div>

  <script type="module" src="/src/js/main.js"></script>
  <script type="module" src="/src/js/pages/detail.js"></script>
</body>
</html>
